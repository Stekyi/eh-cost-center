<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>EH Cost Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#2563eb" />
    <script>
      // Defensive script to neutralize RiteTag extension interference
      (function() {
        // Add a dummy element for RiteTag to manipulate safely
        document.addEventListener('DOMContentLoaded', function() {
          var dummy = document.createElement('div');
          dummy.setAttribute('data-ritetag', 'true');
          dummy.style.display = 'none'; // Hide it
          document.body.appendChild(dummy);
        });

        // Suppress errors from modal.js
        window.addEventListener('error', function(e) {
          if (e.filename && e.filename.includes('modal.js')) {
            e.preventDefault();
            console.warn('Ignored error from RiteTag extension:', e.message);
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
