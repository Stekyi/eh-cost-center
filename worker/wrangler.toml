name = "eh-cost-center-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# R2 bucket binding for media (replaces Firebase Storage).
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "eh-media"

# Cron Trigger — replaces the pubsub updateWeeklyOrderCount job (daily).
[triggers]
crons = ["0 2 * * *"]

# Non-secret vars. Secrets (NEON_DATABASE_URL, JWT_SECRET, HUGGINGFACE_API_TOKEN,
# FIREWORKS_API_KEY) are set with:  wrangler secret put <NAME>
[vars]
# R2 public dev URL (fine for now; swap for a custom domain in production —
# r2.dev URLs are rate-limited and not meant for high-traffic prod).
R2_PUBLIC_BASE = "https://pub-8b567bb009a944559af2ba5cbee244a3.r2.dev"
RAG_ALLOW_ANON = "false"

# For local dev, put secrets in worker/.dev.vars (see .dev.vars.example).
